<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect: encode the current path into a query string
      // so index.html can restore it and hand off to React Router.
      // pathSegmentsToKeep = 0 because this is deployed at the root domain.
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          '/?p=' +
          encodeURIComponent(l.pathname + l.search) +
          (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
      );
    </script>
  </head>
  <body></body>
</html>
