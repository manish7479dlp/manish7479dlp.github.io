<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/profile.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="" />
  <meta name="keywords" content="Portfolio, Full Stack Developer, React, Java" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />
  <title>Portfolio</title>

  <script type="module">
    import { data } from '/src/data.js';

    const title = `${data.personal.name} | ${data.personal.title}`;
    document.title = title;

    document.querySelector('meta[name="description"]').setAttribute("content", data.personal.description || "");
    document.querySelector('meta[property="og:title"]').setAttribute("content", title);
    document.querySelector('meta[property="og:description"]').setAttribute("content", data.personal.description || "");

    // Keep avatar as favcion dynamic too!
    if (data.personal.avatar) {
      document.querySelector('link[rel="icon"]').setAttribute("href", data.personal.avatar);
    }
  </script>
  <!-- GitHub Pages SPA: restore the original path from the ?p= query string -->
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var p = params.get('p');
      if (p) {
        var h = params.get('h') || '';
        window.history.replaceState(null, null, decodeURIComponent(p) + decodeURIComponent(h));
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
